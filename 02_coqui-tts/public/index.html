<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local XTTS Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #0f172a, #111827);
        color: #e5e7eb;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin-top: 0;
        font-size: 1.8rem;
      }
      p {
        color: #cbd5e1;
      }
      form {
        display: grid;
        gap: 16px;
      }
      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }
      textarea,
      input,
      select,
      button {
        font: inherit;
      }
      textarea,
      input[type="text"],
      select,
      input[type="file"] {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.8);
        color: inherit;
        padding: 12px 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: progress;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .panel {
        margin-top: 20px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .muted {
        color: #94a3b8;
        font-size: 0.95rem;
      }
      .error {
        color: #fca5a5;
        white-space: pre-wrap;
      }
      .success {
        color: #86efac;
      }
      audio {
        width: 100%;
        margin-top: 12px;
      }
      code {
        word-break: break-all;
      }
      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Local XTTS Demo</h1>
      <p>上传一段参考音频，输入文本，然后生成克隆语音。上传文件会先自动转成 16kHz / mono / wav。</p>

      <form id="tts-form">
        <label>
          合成文本
          <textarea name="text" required>こんにちは、これはローカルXTTSのデモです。</textarea>
        </label>

        <div class="row">
          <label>
            语言代码
            <select name="language">
              <option value="zh-cn">中文</option>
              <option value="en">English</option>
              <option value="ja" selected>日本語</option>
            </select>
          </label>

          <label>
            参考音频
            <input type="file" name="speaker" accept="audio/*,.wav,.mp3,.m4a,.aac,.flac,.ogg" required />
          </label>
        </div>

        <button type="submit" id="submit-btn">生成语音</button>
      </form>

      <section class="panel">
        <div id="status" class="muted">等待提交。</div>
        <div id="result"></div>
        <audio id="audio" controls hidden></audio>
      </section>
    </main>

    <script>
      const form = document.getElementById('tts-form');
      const button = document.getElementById('submit-btn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const audio = document.getElementById('audio');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        button.disabled = true;
        audio.hidden = true;
        audio.removeAttribute('src');
        result.innerHTML = '';
        status.textContent = '生成中，请稍候。第一次会更慢，因为模型可能需要加载。';
        status.className = 'muted';

        try {
          const formData = new FormData(form);
          const response = await fetch('/tts', {
            method: 'POST',
            body: formData,
          });

          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.detail || payload.error || 'Unknown error');
          }

          status.textContent = '生成成功。';
          status.className = 'success';

          const absoluteAudioUrl = new URL(payload.audioUrl, window.location.origin).toString();
          result.innerHTML = `
            <p><strong>模型:</strong> <code>${payload.model}</code></p>
            <p><strong>输出文件:</strong> <code>${absoluteAudioUrl}</code></p>
            <p><strong>标准化参考音频:</strong> <code>${payload.normalizedSpeakerSample || 'n/a'}</code></p>
          `;

          audio.src = absoluteAudioUrl;
          audio.hidden = false;
          audio.load();
        } catch (error) {
          status.textContent = '生成失败。';
          status.className = 'error';
          result.innerHTML = `<div class="error">${error.message}</div>`;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
