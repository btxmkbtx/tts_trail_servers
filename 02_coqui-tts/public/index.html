<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local XTTS Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #0f172a, #111827);
        color: #e5e7eb;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin-top: 0;
        font-size: 1.8rem;
      }
      p {
        color: #cbd5e1;
      }
      form {
        display: grid;
        gap: 16px;
      }
      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }
      textarea,
      input,
      select,
      button {
        font: inherit;
      }
      textarea,
      input[type="text"],
      select,
      input[type="file"] {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.8);
        color: inherit;
        padding: 12px 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: progress;
      }
      .secondary {
        background: rgba(148, 163, 184, 0.2);
        color: #e5e7eb;
        border: 1px solid rgba(148, 163, 184, 0.35);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .inline {
        display: flex;
        gap: 8px;
      }
      .inline select {
        flex: 1;
      }
      .panel {
        margin-top: 20px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .muted {
        color: #94a3b8;
        font-size: 0.95rem;
      }
      .error {
        color: #fca5a5;
        white-space: pre-wrap;
      }
      .success {
        color: #86efac;
      }
      audio {
        width: 100%;
        margin-top: 12px;
      }
      code {
        word-break: break-all;
      }
      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Local XTTS Demo</h1>
      <p>上传一段参考音频，输入文本，然后生成克隆语音。上传文件会先自动转成 16kHz / mono / wav。</p>

      <form id="tts-form">
        <label>
          合成文本
          <textarea name="text" required>こんにちは、これはローカルXTTSのデモです。</textarea>
        </label>

        <div class="row">
          <label>
            语言代码
            <select name="language">
              <option value="zh-cn">中文</option>
              <option value="en">English</option>
              <option value="ja" selected>日本語</option>
            </select>
          </label>

          <label>
            已保存声音 (voice_id)
            <div class="inline">
              <select name="voice_id" id="voice-id-select">
                <option value="">请选择（或上传新参考音频）</option>
              </select>
              <button type="button" id="refresh-voices" class="secondary">刷新</button>
            </div>
          </label>
        </div>

        <label>
          新参考音频（可选，上传后会自动生成新 voice_id）
          <input type="file" name="speaker" id="speaker-input" accept="audio/*,.wav,.mp3,.m4a,.aac,.flac,.ogg" />
        </label>

        <button type="submit" id="submit-btn">生成语音</button>
      </form>

      <section class="panel">
        <div id="status" class="muted">等待提交。</div>
        <div id="result"></div>
        <audio id="audio" controls hidden></audio>
      </section>
    </main>

    <script>
      const form = document.getElementById('tts-form');
      const button = document.getElementById('submit-btn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const audio = document.getElementById('audio');
      const voiceSelect = document.getElementById('voice-id-select');
      const refreshVoicesBtn = document.getElementById('refresh-voices');
      const speakerInput = document.getElementById('speaker-input');

      async function loadVoices(preferredVoiceId = '') {
        try {
          const response = await fetch('/voices');
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || payload.error || 'Failed to load voices');
          }

          const voices = Array.isArray(payload.voices) ? payload.voices : [];
          const previous = preferredVoiceId || voiceSelect.value;

          voiceSelect.innerHTML = '<option value="">请选择（或上传新参考音频）</option>';
          for (const voice of voices) {
            const option = document.createElement('option');
            option.value = voice.voice_id;
            option.textContent = voice.training_file_name || voice.voice_id;
            voiceSelect.appendChild(option);
          }

          if (previous && voices.some((voice) => voice.voice_id === previous)) {
            voiceSelect.value = previous;
          }
        } catch (error) {
          status.textContent = `声音列表加载失败：${error.message}`;
          status.className = 'error';
        }
      }

      refreshVoicesBtn.addEventListener('click', async () => {
        refreshVoicesBtn.disabled = true;
        await loadVoices();
        refreshVoicesBtn.disabled = false;
      });

      voiceSelect.addEventListener('change', () => {
        if (voiceSelect.value) {
          speakerInput.value = '';
        }
      });

      speakerInput.addEventListener('change', () => {
        if (speakerInput.files && speakerInput.files.length > 0) {
          voiceSelect.value = '';
        }
      });

      loadVoices();

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        button.disabled = true;
        audio.hidden = true;
        audio.removeAttribute('src');
        result.innerHTML = '';
        status.textContent = '生成中，请稍候。第一次会更慢，因为模型可能需要加载。';
        status.className = 'muted';

        try {
          const formData = new FormData(form);
          const selectedVoiceId = (formData.get('voice_id') || '').toString().trim();
          const speakerFile = formData.get('speaker');
          const hasSpeakerFile = speakerFile instanceof File && speakerFile.size > 0;

          if (!selectedVoiceId && !hasSpeakerFile) {
            throw new Error('请选择一个 voice_id，或上传新的参考音频。');
          }

          if (!selectedVoiceId) {
            formData.delete('voice_id');
          }

          if (!hasSpeakerFile) {
            formData.delete('speaker');
          }

          const response = await fetch('/tts', {
            method: 'POST',
            body: formData,
          });

          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.detail || payload.error || 'Unknown error');
          }

          status.textContent = '生成成功。';
          status.className = 'success';

          const absoluteAudioUrl = new URL(payload.audioUrl, window.location.origin).toString();
          result.innerHTML = `
            <p><strong>模型:</strong> <code>${payload.model}</code></p>
            <p><strong>voice_id:</strong> <code>${payload.voiceId || 'n/a'}</code></p>
            <p><strong>voice来源:</strong> <code>${payload.voiceSource || 'n/a'}</code></p>
            <p><strong>输出文件:</strong> <code>${absoluteAudioUrl}</code></p>
            <p><strong>标准化参考音频:</strong> <code>${payload.normalizedSpeakerSample || 'n/a'}</code></p>
          `;

          if (payload.voiceId) {
            await loadVoices(payload.voiceId);
          }

          audio.src = absoluteAudioUrl;
          audio.hidden = false;
          audio.load();
        } catch (error) {
          status.textContent = '生成失败。';
          status.className = 'error';
          result.innerHTML = `<div class="error">${error.message}</div>`;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
